  - id: subtask_044
    task_id: task_009
    title: "[DIP-44] serialized rebase-and-retry integration: lock, rebase,
      re-verify, fast-forward"
    repo: dipsaus-ai
    status: queued
    priority_score: 50
    risk: high
    scopes: []
    claim_mode: exclusive
    depends_on:
      - subtask_042
    blockers: []
    execution:
      preferred_agents: []
      required_capabilities: []
      manual_approval_required: false
    completion:
      done_when:
        - "Integration is serialized: an agent acquires an exclusive lock before
          touching main, so N agents finishing at once integrate one at a time
          rather than racing a fast-forward that only the first can win"
        - The agent rebases its story branch onto the latest origin/main before
          merging
        - "The FULL verify suite re-runs on the REBASED result, before the
          fast-forward. A clean rebase is not a passing rebase: two branches can
          rebase with zero textual conflict and still break each other
          semantically (e.g. both adding a field to the same Config type), and
          merging without re-verifying pushes a combination nobody ever tested"
        - On a rebase conflict, or a verify failure after rebase, the agent
          releases the lock, moves the story to 'review', reports what failed,
          and STOPS — it does not retry indefinitely and does not attempt
          automatic conflict resolution
        - Retries are bounded (e.g. 3 attempts at re-acquiring the lock /
          re-rebasing when main moved underneath), after which the story goes to
          'review' and the agent stops
        - The agent NEVER force-pushes and never rewrites main's history; the
          lock is released on every exit path, including failure, so a crashed
          agent cannot deadlock the others
    planner:
      origin: manual
      locked: false
    created_at: 2026-07-13T09:07:00.896Z
    updated_at: 2026-07-13T09:07:50.218Z
