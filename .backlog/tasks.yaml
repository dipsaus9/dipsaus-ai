  - id: task_007
    title: "Epic: dad-joke hook — user-visible dad jokes during long turns"
    description: >-
      Ship a Claude Code hook, inside the existing root plugin, that surfaces a
      bundled dad joke when a turn runs long — without ever slowing or failing a
      tool call.


      Mechanism: no Claude Code hook is timer-driven, so 'thinking for a long
      time' is approximated by the mid-turn tool loop. A UserPromptSubmit hook
      stamps turn start into a per-session state file; a PostToolUse hook reads
      it, and once elapsed passes DAD_JOKE_THRESHOLD_MS (default 30s) — and at
      most once per DAD_JOKE_COOLDOWN_MS (default 60s) — it emits
      {"systemMessage": "<joke>"} on stdout. systemMessage renders to the human;
      additionalContext would feed Claude instead, which is not what we want.


      Known limitation, by design: a long turn with zero tool calls (pure
      extended thinking) will not fire. Documented, not fixed.


      Jokes come from a bundled jokes.json (offline, deterministic, no latency
      in the hot path), with an opt-in DAD_JOKE_API=1 live fetch that falls back
      to the pool on timeout or error.


      Not a skill and not an MCP: both are model-invoked, so Claude would have
      to choose to tell the joke mid-thought, which it cannot do. Hooks are the
      only runtime-driven surface. Deterministic logic, so it is covered by
      Vitest unit tests, not the LLM-judge eval harness.
    source_links: []
    status: done
    priority: P2
    labels: []
    repo_targets:
      - dipsaus-ai
    acceptance_criteria:
      - The hook ships inside the root plugin (hooks/hooks.json, paths via
        ${CLAUDE_PLUGIN_ROOT}) and fires mid-turn during a tool loop
      - The joke renders to the user via systemMessage and never enters Claude's
        context
      - "A hook failure (corrupt state, missing jokes.json, API timeout) can
        never block or fail a tool call: both entrypoints always exit 0"
      - bun run lint && bun run typecheck && bun run test all pass; joke
        selection, trigger logic, and state store each have unit tests
      - README documents standalone + plugin install and the three env knobs
        (DAD_JOKE_THRESHOLD_MS, DAD_JOKE_COOLDOWN_MS, DAD_JOKE_DISABLE) plus
        opt-in DAD_JOKE_API
