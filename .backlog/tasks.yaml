  - id: task_008
    title: "Epic: dad-joke hook visibility — styling + opt-in desktop notification"
    description: >-
      The dad-joke hook (task_007) renders, but the joke gets lost in tool-call
      output — it reads like another log line. Make it land.


      Two mechanisms, both gated on a spike, because the epic's rendering
      assumptions are exactly what bit us last time (a missing newline made a
      valid-JSON, exit-0 hook silently render nothing).


      1. Style the inline joke. Emoji + structure always (survives any
      terminal); ANSI colour layered on top only if the spike proves Claude Code
      passes it through rather than stripping or literalising it. NO_COLOR
      honoured.


      2. Opt-in desktop notification. DAD_JOKE_NOTIFY=1, default off, fires
      alongside the inline joke — for the long turn you have walked away from.
      Mechanism is terminalSequence OSC 777, the one notification path the
      Claude Code docs explicitly allowlist. Note terminalSequence REJECTS CSI
      sequences, so it cannot be used to colour text; colour, if any, must ride
      inside systemMessage.


      Also folds in the regression guard missing from task_007: the entrypoints
      are hand-verified glue with no tests, and this epic rewrites the exact
      stdout bytes that already failed silently once. A dropped newline or a
      mangled escape code would disable the feature with no error, and all
      existing unit tests would still pass.
    source_links: []
    status: ready
    priority: P2
    labels: []
    repo_targets: []
    acceptance_criteria:
      - A spike records, with observed evidence, whether ANSI colour survives
        systemMessage, whether emoji/multi-line/box-drawing render, and whether
        terminalSequence OSC 777 fires a real desktop notification — including
        whether it can be emitted alongside systemMessage or only instead of it
      - "The inline joke is visually distinct from tool-call output: emoji +
        structure at minimum, colour when the spike proves it works, degrading
        cleanly when it does not"
      - NO_COLOR is honoured, so a user who has opted out of colour globally
        gets plain text
      - DAD_JOKE_NOTIFY=1 fires a desktop notification per joke; default off,
        and a terminal that ignores OSC 777 loses the notification but never the
        joke and never the tool call
      - A smoke test spawns each entrypoint with a fake payload and asserts exit
        0 plus newline-terminated valid JSON on stdout, so a dropped newline or
        mangled escape code fails CI instead of silently disabling the feature
      - Both entrypoints still always exit 0; bun run lint && bun run typecheck
        && bun run test all pass
      - README documents DAD_JOKE_NOTIFY, the colour behaviour + NO_COLOR, and
        states plainly that notifications depend on terminal OSC 777 support
