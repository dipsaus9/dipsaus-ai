  - id: task_009
    title: "Epic: parallel story delivery — multiple Claudes, one backlog"
    description: >-
      Run several Claude instances at once, each delivering a different story
      against one shared backlog, using Claude Code's NATIVE worktree system
      (https://code.claude.com/docs/en/worktrees) rather than hand-rolled
      machinery.


      Operator model (decided): the skill self-isolates. /backlog-deliver runs
      from the main checkout, gates, claims, then calls the EnterWorktree tool
      itself. Claude creates .claude/worktrees/<PREFIX>-<n>-<slug>/ on branch
      worktree-<PREFIX>-<n>-<slug>. The operator never pre-launches 'claude
      --worktree' in N terminals. Isolation is ALWAYS on — one code path, solo
      and parallel alike.


      Integration model (decided): PR per story. The agent pushes its worktree
      branch, opens a PR, and stops. Nothing self-merges. GitHub's
      required-status-check + require-branches-up-to-date rule IS the 're-verify
      the merged combination' guarantee, and the repo's existing pull_request CI
      job (bun install --frozen-lockfile, lint, typecheck, test) is that check.
      This deletes the previously-planned integration flock, the
      rebase-and-retry loop, the post-rebase re-verify, and the unsolved 'a
      worktree cannot fast-forward local main' hazard — all of them
      reimplementations of platform behaviour.


      Backlog state (decided, evidence-backed): the backlog CLI resolves
      .backlog by walking UP FROM CWD, not from config.toml's repos[].path. Run
      from a worktree it therefore reads and writes the worktree's own private
      copy — which makes claims mutually invisible between agents (two worktrees
      were observed both taking an 'exclusive' claim on the same path, with
      independent id counters and no warning), makes 'claim start' die with
      ENOENT (.backlog/claims/ is gitignored so never checked out), and makes
      the tracked .backlog/*.yaml conflict on merge over a semantically empty
      updated_at.


      Therefore: EVERY backlog CLI call runs with cwd = BACKLOG_ROOT = dirname
      "$(git rev-parse --path-format=absolute --git-common-dir)", which resolves
      to the main checkout from a worktree AND from a plain checkout, so no
      branching logic is needed. One .backlog means claims are cross-agent
      visible and the worktree's YAML never diverges. Agents NEVER stage
      .backlog/{tasks,subtasks}.yaml or id-counters.json; the operator commits
      that state from the main checkout. Story docs (.backlog/stories/*.md) ARE
      committed on the story branch — one file per story, so they cannot
      collide.


      Contention: two agents on DIFFERENT stories can still collide on files.
      Real example in this backlog: DIP-37 and DIP-38 have no dependency edge
      but both modify config.ts and on-post-tool-use.ts. A dependency-only
      picker hands them out together and guarantees a conflict. Scope-based
      contention prevents it, but only if stories declare scopes — most today do
      not.


      Note: config.toml's enforce_on_commit / auto_claim_on_commit are currently
      INERT — no pre-commit hook is installed. 'backlog claim check --staged' is
      a real exit-1 gate, but only if the skill calls it explicitly.
    source_links: []
    status: ready
    priority: P2
    labels: []
    repo_targets: []
    acceptance_criteria:
      - "The worktree environment is configured for Claude's native system:
        .claude/worktrees/ is gitignored, worktree.baseRef is pinned explicitly,
        and the minimum Claude Code version is recorded"
      - "backlog-deliver self-isolates: it calls EnterWorktree itself from the
        main checkout, bootstraps the fresh worktree with bun install before any
        verify, and never requires the operator to pre-launch claude --worktree"
      - Every backlog CLI call in both skills runs with cwd = BACKLOG_ROOT (the
        main checkout), so claims are cross-agent visible and the worktree's
        .backlog YAML never diverges
      - Pickup reserves the story via backlog claim start AND refuses a story
        whose declared scopes overlap an active claim, offering the next
        non-contended story instead — so the DIP-37/DIP-38 collision is caught
        before any code is written
      - backlog-plan sets scopes on every story it creates, and the story
        standard requires them, so contention is computable rather than guessed
      - "Delivery is PR-per-story: the agent pushes its worktree branch, opens a
        PR, releases its claim and stops. It never merges to main, never
        force-pushes, and never stages the mutable .backlog YAML"
      - main's ruleset requires the CI status check and requires branches to be
        up to date, so no untested combination of two parallel stories can land
        — this replaces the hand-rolled rebase-and-re-verify lock
      - "The parallel workflow is documented: the EnterWorktree model, the
        claim/scope contention rules, PR-per-story, who owns the .backlog YAML,
        the max_agents ceiling, and how this squares with CLAUDE.md's
        review-before-commit rule"
    dependencies: []
