  - id: task_005
    title: "Goal-scoped skill eval: anti-cheat guards, coherence gate, model matrix"
    description: "Rework the eval harness so it measures whether a SKILL delivers
      each of its GOALS, per model, instead of scoring whole fixtures with
      gameable negative-only checks. Today: checks are all negative assertions
      (!/calcTax\\(/), so a baseline that deletes the feature scores perfect —
      this is why baseline 'beat' the skill 4.67 vs 3.67 on
      cross-feature-coupling. Nothing asserts the fixture actually violated the
      check before refactor, output is never typechecked, and the aggregation
      unit is the fixture rather than the skill goal. Reframe: unit of
      measurement = goal; each check gains pre() applicability + guard()
      capability-survival predicates; a coherence typecheck gates each sample;
      results reported per goal x model with bootstrap CIs. Report-only, never
      fails on quality."
    source_links: []
    status: ready
    priority: P1
    labels: []
    repo_targets: []
    acceptance_criteria:
      - Check contract is { goal, severity, desc, pre, post, guard }; a check is
        scored only when pre(before) is true
      - post(after) && !guard(after) scores -1, so removing the feature to
        satisfy a negative check is penalised, not rewarded
      - Each sample passes a coherence typecheck (syntax TS1xxx + TS2304 only)
        or scores 0 across all goals; unresolved-module errors (TS2307) are
        ignored
      - Results aggregate per skill goal across fixtures, not per fixture
      - Eval sweeps a configurable model matrix (default haiku, sonnet) and
        reports a goal x model verdict table
      - Each goal reports delta + bootstrap 95% CI and a HELPS / NO EFFECT /
        HURTS verdict
      - Test asserts structure only; no quality threshold, so it cannot flake
      - CLI calls run through a concurrency pool; wall-clock does not scale
        linearly with the model matrix
      - tests/eval/check.ts (dead binaryCheck) removed
    dependencies: []
